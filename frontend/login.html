<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaarta - Login</title>
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="vt-wrap">
        <div class="vt-glow1"></div>
        <div class="vt-glow2"></div>

        <div class="vt-card">

            <!-- Logo -->
            <div class="vt-logo">
                <div class="vt-logo-text">वार्ता</div>
                <div class="vt-logo-sub">Real-time chat & video</div>
            </div>
            <div class="vt-divider"></div>

            <!-- Tabs -->
            <div class="vt-tabs">
                <div class="vt-tab active" onclick="switchTab('login')">Login</div>
                <div class="vt-tab" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <!-- Login Form -->
            <div id="login-view">
                <div class="vt-heading">Welcome back 👋</div>
                <div class="vt-sub">Login to your Vaarta account</div>

                <div class="vt-field">
                    <label class="vt-label">EMAIL</label>
                    <input class="vt-input" type="email" placeholder="you@email.com" id="l-email">
                </div>

                <div class="vt-field">
                    <label class="vt-label">PASSWORD</label>
                    <input class="vt-input" type="password" placeholder="Enter password" id="l-pass">
                </div>

                <div class="vt-row">
                    <label class="vt-remember">
                        <input type="checkbox" class="vt-check"> Remember me
                    </label>
                    <a class="vt-forgot">Forgot password?</a>
                </div>

                <button class="vt-btn" onclick="doLogin()">Login to Vaarta</button>
                <div class="vt-msg" id="l-msg"></div>
            </div>

            <!-- Signup Form -->
            <div id="signup-view" style="display:none;">
                <div class="vt-heading">Create account 🚀</div>
                <div class="vt-sub">Join Vaarta today</div>

                <div class="vt-field">
                    <label class="vt-label">FULL NAME</label>
                    <input class="vt-input" type="text" placeholder="Your name" id="s-name">
                </div>

                <div class="vt-field">
                    <label class="vt-label">EMAIL</label>
                    <input class="vt-input" type="email" placeholder="you@email.com" id="s-email">
                </div>

                <div class="vt-field">
                    <label class="vt-label">PASSWORD</label>
                    <input class="vt-input" type="password" placeholder="Create a password" id="s-pass">
                </div>

                <button class="vt-btn" onclick="doSignup()">Create Account</button>
                <div class="vt-msg" id="s-msg"></div>
            </div>

            <!-- Google Button -->
            <div class="vt-or">or</div>
            <button class="vt-google">
                <svg width="16" height="16" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
