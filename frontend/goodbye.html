<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vaarta - Call Ended</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Sora',sans-serif; }
        body { background:#0a0a0f; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#13131a; border:1px solid #2a2a3a; border-radius:24px; padding:48px 40px; text-align:center; max-width:400px; width:90%; }
        .icon { font-size:52px; margin-bottom:16px; }
        h2 { font-size:24px; color:#f0f0f0; margin-bottom:8px; }
        p { font-size:14px; color:#666; margin-bottom:28px; }
        .btn { display:block; width:100%; padding:13px; background:#7c6af7; border:none; border-radius:10px; color:white; font-size:15px; font-weight:600; font-family:'Sora',sans-serif; cursor:pointer; text-decoration:none; margin-bottom:10px; }
        .btn-outline { background:transparent; border:1px solid #2a2a3a; color:#888; }
        .btn-outline:hover { border-color:#7c6af7; color:#a78bfa; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">👋</div>
        <h2>Call Ended</h2>
        <p>Thanks for using Vaarta! Hope the call went well.</p>
        <a href="login.html" class="btn">Create Your Own Account</a>
        <button class="btn-outline btn" onclick="window.close()">Close Window</button>
    </div>
</body>
</html>
